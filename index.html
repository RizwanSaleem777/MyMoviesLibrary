<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rizwan Movie Collection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #090b10;
      --panel: #121721;
      --panel-soft: #171e2a;
      --line: #283142;
      --text: #f7f8fb;
      --muted: #a8b0c2;
      --red: #d71920;
      --gold: #f3c44f;
      --blue: #4f8cff;
      --green: #3ddc97;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(215, 25, 32, 0.18), transparent 34rem),
        linear-gradient(135deg, #090b10 0%, #101622 52%, #08090d 100%);
      color: var(--text);
      font-family: "Montserrat", Arial, sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(9, 11, 16, 0.9);
      backdrop-filter: blur(18px);
    }

    .header-inner {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 22px 0;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .brand h1 {
      font-size: clamp(26px, 4vw, 44px);
      line-height: 1;
      letter-spacing: 0;
      font-weight: 800;
    }

    .brand p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .view-toggle {
      display: flex;
      gap: 8px;
      padding: 5px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .view-toggle button,
    .clear-btn {
      border: 0;
      color: var(--text);
      background: transparent;
      cursor: pointer;
      font: inherit;
    }

    .view-toggle button {
      min-height: 38px;
      padding: 0 14px;
      border-radius: 6px;
      font-weight: 700;
      color: var(--muted);
    }

    .view-toggle button.active {
      background: var(--red);
      color: white;
    }

    .filters {
      display: grid;
      grid-template-columns: minmax(220px, 1.5fr) repeat(4, minmax(140px, 1fr));
      gap: 12px;
      align-items: center;
    }

    .control {
      min-width: 0;
    }

    .control input,
    .control select {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      padding: 0 14px;
      outline: none;
      font: inherit;
      font-size: 14px;
    }

    .control input:focus,
    .control select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(79, 140, 255, 0.18);
    }

    .add-panel {
      margin-bottom: 24px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(18, 23, 33, 0.88);
      box-shadow: var(--shadow);
    }

    .add-panel h2 {
      margin-bottom: 14px;
      font-size: 20px;
      font-weight: 800;
    }

    .add-form {
      display: grid;
      grid-template-columns: minmax(220px, 1.3fr) minmax(110px, 0.55fr) repeat(2, minmax(130px, 0.7fr)) minmax(110px, 0.55fr) minmax(180px, 1fr) auto;
      gap: 12px;
      align-items: end;
    }

    .add-form label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .add-form input,
    .add-form select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      padding: 0 12px;
      outline: none;
      font: inherit;
      font-size: 14px;
    }

    .add-btn {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      background: var(--red);
      color: white;
      cursor: pointer;
      padding: 0 18px;
      font: inherit;
      font-weight: 800;
    }

    .export-btn {
      min-height: 40px;
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #252d3a;
      color: white;
      cursor: pointer;
      padding: 0 14px;
      font: inherit;
      font-weight: 800;
    }

    .form-message {
      min-height: 18px;
      margin-top: 10px;
      color: var(--green);
      font-size: 13px;
      font-weight: 700;
    }

    .clear-btn {
      min-height: 46px;
      border-radius: 8px;
      background: #252d3a;
      font-weight: 700;
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 26px 0 44px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }

    .stat-card {
      min-height: 92px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(23, 30, 42, 0.95), rgba(18, 23, 33, 0.95));
      box-shadow: var(--shadow);
    }

    .stat-card strong {
      display: block;
      font-size: clamp(24px, 4vw, 34px);
      line-height: 1;
      color: var(--text);
    }

    .stat-card span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .section-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 14px;
      margin: 28px 0 14px;
    }

    .section-title h2 {
      font-size: 24px;
      font-weight: 800;
    }

    .section-title span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 18px;
    }

    .movie-card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.24);
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    .movie-card:hover {
      transform: translateY(-4px);
      border-color: rgba(215, 25, 32, 0.7);
      box-shadow: 0 18px 38px rgba(215, 25, 32, 0.16);
    }

    .poster {
      position: relative;
      display: grid;
      place-items: center;
      aspect-ratio: 2 / 3;
      overflow: hidden;
      background:
        linear-gradient(160deg, rgba(215, 25, 32, 0.7), rgba(9, 11, 16, 0.15)),
        linear-gradient(45deg, #1a2230, #090b10);
      color: white;
    }

    .poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .poster img.is-hidden {
      display: none;
    }

    .poster-placeholder {
      width: 74%;
      text-align: center;
      font-size: clamp(16px, 2vw, 24px);
      font-weight: 800;
      line-height: 1.14;
      overflow-wrap: anywhere;
    }

    .movie-info {
      padding: 14px;
    }

    .movie-title {
      min-height: 44px;
      font-size: 16px;
      font-weight: 800;
      line-height: 1.35;
    }

    .movie-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 12px 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .imdb-rating {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 34px;
      margin-top: 12px;
      width: 100%;
      border-radius: 6px;
      background: rgba(243, 196, 79, 0.14);
      color: #ffd96f;
      padding: 0 10px;
      font-size: 13px;
      font-weight: 800;
    }

    .poster-actions {
      margin-top: 10px;
    }

    .poster-upload {
      display: none;
    }

    .poster-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #252d3a;
      color: white;
      cursor: pointer;
      font-size: 13px;
      font-weight: 800;
    }

    .poster-btn:hover {
      border-color: var(--blue);
    }

    .rating {
      color: var(--gold);
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .tag {
      max-width: 100%;
      padding: 6px 9px;
      border-radius: 6px;
      background: var(--panel-soft);
      color: #d8deea;
      font-size: 12px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .tag.origin {
      color: #dff8ec;
      background: rgba(61, 220, 151, 0.15);
    }

    .empty {
      display: none;
      padding: 42px 20px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: rgba(18, 23, 33, 0.7);
      text-align: center;
      color: var(--muted);
      font-weight: 700;
    }

    .empty.visible {
      display: block;
    }

    footer {
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--muted);
      padding: 22px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
    }


    .admin-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .admin-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .hidden {
      display: none !important;
    }

    .card-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .card-btn {
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #252d3a;
      color: white;
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      font-weight: 800;
    }

    .card-btn.delete {
      background: rgba(215, 25, 32, 0.2);
      color: #ffb7b7;
    }
    @media (max-width: 900px) {
      .filters,
      .stats,
      .add-form {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .filters .control:first-child {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 620px) {
      .header-inner,
      main {
        width: min(100% - 22px, 1180px);
      }

      .brand-row {
        align-items: stretch;
        flex-direction: column;
      }

      .view-toggle {
        width: 100%;
      }

      .view-toggle button {
        flex: 1;
      }

      .filters,
      .stats,
      .add-form {
        grid-template-columns: 1fr;
      }

      .movies-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .movie-info {
        padding: 12px;
      }

      .movie-title {
        min-height: 58px;
        font-size: 14px;
      }

      .movie-meta {
        align-items: flex-start;
        flex-direction: column;
        gap: 6px;
      }
    }
  </style>

        </div>

        <div class="view-toggle" aria-label="View mode">
          <button type="button" class="" data-view="grid">Grid</button>
          <button type="button" data-view="year" class="active">Year Wise</button>
        </div>
      </div>

      <div class="filters">
        <div class="control">
          <input type="search" id="searchInput" placeholder="Search by movie, year, origin, type..." autocomplete="off">
        </div>

        </div>

        <div class="control">
          <select id="originFilter" aria-label="Filter by origin"><option value="all">All Origins</option><option value="Bollywood">Bollywood</option><option value="Hollywood">Hollywood</option></select>
        </div>

        <div class="control">
          <select id="typeFilter" aria-label="Filter by type"><option value="all">All Types</option><option value="Movie">Movie</option><option value="Series">Series</option></select>
        </div>

        <button type="button" class="clear-btn" id="clearFilters">Clear</button>
      </div>
    </div>
  </header>

  <main>
    <section class="stats" aria-label="Collection stats">
      <div class="stat-card">
        <strong id="totalMovies">1</strong>
        <span>Total Titles</span>
      </div>
      <div class="stat-card">
        <strong id="totalYears">1</strong>
        <span>Years Covered</span>
      </div>
      <div class="stat-card">
        <strong id="totalOrigins">1</strong>
        <span>Origins</span>
      </div>
      <div class="stat-card">
        <strong id="latestYear">2026</strong>
        <span>Latest Year</span>
      </div>
    </section>

        <section class="add-panel" aria-label="Manage movies">
      <div class="admin-head">
        <h2>Manage Movies</h2>
        <div class="admin-actions">
          <button type="button" class="export-btn" id="setPasswordBtn">Set Password</button>
          <button type="button" class="export-btn" id="downloadUpdatedFile">Download Updated File</button>
        </div>
      </div>
      <form class="add-form" id="addMovieForm">
        <input type="hidden" id="editingKey" value="">
        <label>
          Movie Name
          <input type="text" id="newTitle" placeholder="Movie title" required="">
        </label>

        <label>
          Year
          <input type="number" id="newYear" min="1900" max="2100" placeholder="2026" required="">
        </label>

        <label>
          Origin
          <input type="text" id="newOrigin" placeholder="Hollywood" required="">
        </label>

        <label>
          Type
          <select id="newType">
            <option value="Movie">Movie</option>
            <option value="Series">Series</option>
            <option value="Season">Season</option>
          </select>
        </label>

        <label>
          IMDb
          <input type="number" id="newImdb" min="0" max="10" step="0.1" placeholder="7.8">
        </label>

        <label>
          Poster Path
          <input type="text" id="newPoster" placeholder="posters/movie-name.jpg">
        </label>

        <button type="submit" class="add-btn" id="saveMovieBtn">Add</button>
        <button type="button" class="clear-btn hidden" id="cancelEditBtn">Cancel</button>
      </form>
      <div class="form-message" id="formMessage" aria-live="polite">Apex updated. Download updated file before pushing to GitHub.</div>
    </section>
    <section id="results"></section>
    <div class="empty" id="emptyState">No movies found. Try a different search or filter.</div>
  </main>

  <footer>
    Built for Rizwan Movie Collection
  </footer>

    const ADMIN_PASSWORD_KEY = "rizwanMovieAdminPassword";
    const elements = {
      search: document.getElementById("searchInput"),
      year: document.getElementById("yearFilter"),
      origin: document.getElementById("originFilter"),
      type: document.getElementById("typeFilter"),
      clear: document.getElementById("clearFilters"),
      addForm: document.getElementById("addMovieForm"),
      editingKey: document.getElementById("editingKey"),
      newTitle: document.getElementById("newTitle"),
      newYear: document.getElementById("newYear"),
      newOrigin: document.getElementById("newOrigin"),
      newType: document.getElementById("newType"),
      newImdb: document.getElementById("newImdb"),
      newPoster: document.getElementById("newPoster"),
      saveMovieBtn: document.getElementById("saveMovieBtn"),
      cancelEditBtn: document.getElementById("cancelEditBtn"),
      setPasswordBtn: document.getElementById("setPasswordBtn"),
      downloadUpdatedFile: document.getElementById("downloadUpdatedFile"),
      formMessage: document.getElementById("formMessage"),
      results: document.getElementById("results"),
      empty: document.getElementById("emptyState"),
      totalMovies: document.getElementById("totalMovies"),
      totalYears: document.getElementById("totalYears"),
      totalOrigins: document.getElementById("totalOrigins"),
      latestYear: document.getElementById("latestYear"),
      viewButtons: document.querySelectorAll("[data-view]")
    };

    let currentView = "grid";

    function simpleHash(text) {
      let hash = 5381;
      for (let index = 0; index < text.length; index += 1) {
        hash = ((hash << 5) + hash) + text.charCodeAt(index);
        hash = hash >>> 0;
      }
      return String(hash);
    }

    function requirePassword() {
      const savedHash = localStorage.getItem(ADMIN_PASSWORD_KEY);
      if (!savedHash) {
        const newPassword = prompt("Set admin password first:");
        if (!newPassword) return false;
        localStorage.setItem(ADMIN_PASSWORD_KEY, simpleHash(newPassword));
        elements.formMessage.textContent = "Password set.";
        return true;
      }

      const password = prompt("Enter admin password:");
      if (!password) return false;
      if (simpleHash(password) !== savedHash) {
        alert("Wrong password.");
        return false;
      }
      return true;
    }

    function setPassword() {
      const savedHash = localStorage.getItem(ADMIN_PASSWORD_KEY);
      if (savedHash && !requirePassword()) return;
      const newPassword = prompt("New password:");
      if (!newPassword) return;
      localStorage.setItem(ADMIN_PASSWORD_KEY, simpleHash(newPassword));
      elements.formMessage.textContent = "Password saved.";
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function movieKey(movie) {
      return [movie.title, movie.year, movie.origin, movie.type].join("|").toLowerCase();
    }

    function uniqueSorted(values, descending) {
      return Array.from(new Set(values.filter(Boolean))).sort(function(a, b) {
        if (typeof a === "number" && typeof b === "number") return descending ? b - a : a - b;
        return String(a).localeCompare(String(b));
      });
    }

    function addOptions(select, values) {
      values.forEach(function(value) {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }

    function resetSelect(select, label) {
      const selectedValue = select.value || "all";
      select.innerHTML = '<option value="all">' + label + '</option>';
      return selectedValue;
    }

    function populateFilters() {
      const selectedYear = resetSelect(elements.year, "All Years");
      const selectedOrigin = resetSelect(elements.origin, "All Origins");
      const selectedType = resetSelect(elements.type, "All Types");
      addOptions(elements.year, uniqueSorted(movies.map(function(movie) { return Number(movie.year); }), true));
      addOptions(elements.origin, uniqueSorted(movies.map(function(movie) { return movie.origin; }), false));
      addOptions(elements.type, uniqueSorted(movies.map(function(movie) { return movie.type; }), false));
      elements.year.value = Array.from(elements.year.options).some(function(option) { return option.value === selectedYear; }) ? selectedYear : "all";
      elements.origin.value = Array.from(elements.origin.options).some(function(option) { return option.value === selectedOrigin; }) ? selectedOrigin : "all";
      elements.type.value = Array.from(elements.type.options).some(function(option) { return option.value === selectedType; }) ? selectedType : "all";
    }

    function getFilteredMovies() {
      const query = elements.search.value.trim().toLowerCase();
      const selectedYear = elements.year.value;
      const selectedOrigin = elements.origin.value;
      const selectedType = elements.type.value;
      return movies
        .filter(function(movie) {
          const searchable = [movie.title, movie.year, movie.origin, movie.type, movie.imdb].join(" ").toLowerCase();
          return searchable.includes(query)
            && (selectedYear === "all" || String(movie.year) === selectedYear)
            && (selectedOrigin === "all" || movie.origin === selectedOrigin)
            && (selectedType === "all" || movie.type === selectedType);
        })
        .sort(function(a, b) { return Number(b.year) - Number(a.year) || String(a.title).localeCompare(String(b.title)); });
    }

    function getInitials(title) {
      return String(title || "")
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 4)
        .map(function(word) { return word[0]; })
        .join("");
    }

    function slugifyPoster(title, year) {
      return (String(title || "") + "-" + String(year || ""))
        .toLowerCase()
        .replace(/&/g, "and")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function getPosterSources(movie) {
      if (movie.poster) return [movie.poster];
      const fileName = slugifyPoster(movie.title, movie.year);
      return [
        "posters/" + fileName + ".jpg",
        "posters/" + fileName + ".jpeg",
        "posters/" + fileName + ".png",
        "posters/" + fileName + ".webp"
      ];
    }

    function tryNextPoster(image) {
      const sources = JSON.parse(image.dataset.sources || "[]");
      const nextIndex = Number(image.dataset.index || 0) + 1;
      if (nextIndex < sources.length) {
        image.dataset.index = String(nextIndex);
        image.src = sources[nextIndex];
        return;
      }
      image.classList.add("is-hidden");
      image.nextElementSibling.hidden = false;
    }

    function getImdbRating(movie) {
      return movie.imdb ? Number(movie.imdb).toFixed(1) : "N/A";
    }

    function renderStats(list) {
      const years = uniqueSorted(list.map(function(movie) { return Number(movie.year); }), false);
      const origins = uniqueSorted(list.map(function(movie) { return movie.origin; }), false);
      elements.totalMovies.textContent = list.length;
      elements.totalYears.textContent = years.length;
      elements.totalOrigins.textContent = origins.length;
      elements.latestYear.textContent = years.length ? Math.max.apply(null, years) : "-";
    }

    function createMovieCard(movie) {
      const card = document.createElement("article");
      const posterSources = getPosterSources(movie);
      card.className = "movie-card";
      card.innerHTML = ''
        + '<div class="poster">'
        + '<img src="' + escapeHtml(posterSources[0]) + '" data-sources=\'' + escapeHtml(JSON.stringify(posterSources)) + '\' data-index="0" alt="' + escapeHtml(movie.title) + ' poster" loading="lazy" onerror="tryNextPoster(this)">'
        + '<div class="poster-placeholder" hidden>' + escapeHtml(getInitials(movie.title)) + '</div>'
        + '</div>'
        + '<div class="movie-info">'
        + '<h3 class="movie-title">' + escapeHtml(movie.title) + '</h3>'
        + '<div class="movie-meta"><span>' + escapeHtml(movie.year) + '</span><span>' + escapeHtml(movie.type) + '</span></div>'
        + '<div class="tags"><span class="tag origin">' + escapeHtml(movie.origin) + '</span></div>'
        + '<div class="imdb-rating"><span>IMDb</span><span>' + escapeHtml(getImdbRating(movie)) + '</span></div>'
        + '<div class="card-actions"><button type="button" class="card-btn edit">Edit</button><button type="button" class="card-btn delete">Delete</button></div>'
        + '</div>';
      card.querySelector(".edit").addEventListener("click", function() { startEdit(movie); });
      card.querySelector(".delete").addEventListener("click", function() { deleteMovie(movie); });
      return card;
    }

    function createSection(title, count) {
      const section = document.createElement("section");
      const heading = document.createElement("div");
      const grid = document.createElement("div");
      heading.className = "section-title";
      heading.innerHTML = '<h2>' + escapeHtml(title) + '</h2><span>' + count + ' title' + (count === 1 ? '' : 's') + '</span>';
      grid.className = "movies-grid";
      section.append(heading, grid);
      return { section: section, grid: grid };
    }

    function renderGrid(list) {
      const created = createSection("All Titles", list.length);
      list.forEach(function(movie) { created.grid.appendChild(createMovieCard(movie)); });
      elements.results.appendChild(created.section);
    }

    function renderYearWise(list) {
      const grouped = list.reduce(function(groups, movie) {
        groups[movie.year] = groups[movie.year] || [];
        groups[movie.year].push(movie);
        return groups;
      }, {});
      Object.keys(grouped).sort(function(a, b) { return Number(b) - Number(a); }).forEach(function(year) {
        const yearMovies = grouped[year];
        const created = createSection(year, yearMovies.length);
        yearMovies.forEach(function(movie) { created.grid.appendChild(createMovieCard(movie)); });
        elements.results.appendChild(created.section);
      });
    }

    function render() {
      const list = getFilteredMovies();
      elements.results.innerHTML = "";
      elements.empty.classList.toggle("visible", list.length === 0);
      renderStats(list);
      if (!list.length) return;
      if (currentView === "year") renderYearWise(list);
      else renderGrid(list);
    }

    function clearForm() {
      elements.addForm.reset();
      elements.editingKey.value = "";
      elements.saveMovieBtn.textContent = "Add";
      elements.cancelEditBtn.classList.add("hidden");
    }

    function startEdit(movie) {
      if (!requirePassword()) return;
      elements.editingKey.value = movieKey(movie);
      elements.newTitle.value = movie.title || "";
      elements.newYear.value = movie.year || "";
      elements.newOrigin.value = movie.origin || "";
      elements.newType.value = movie.type || "Movie";
      elements.newImdb.value = movie.imdb || "";
      elements.newPoster.value = movie.poster || "";
      elements.saveMovieBtn.textContent = "Update";
      elements.cancelEditBtn.classList.remove("hidden");
      elements.newTitle.focus();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function deleteMovie(movie) {
      if (!requirePassword()) return;
      if (!confirm("Delete " + movie.title + "?")) return;
      const index = movies.findIndex(function(item) { return movieKey(item) === movieKey(movie); });
      if (index >= 0) movies.splice(index, 1);
      populateFilters();
      render();
      elements.formMessage.textContent = movie.title + " deleted. Download updated file before pushing to GitHub.";
    }

    function normalizePosterPath(path) {
      return String(path || "").trim().replace(/\\/g, "/").replace(/^\.\//, "");
    }

    elements.addForm.addEventListener("submit", function(event) {
      event.preventDefault();
      if (!requirePassword()) return;
      const movie = {
        title: elements.newTitle.value.trim(),
        year: Number(elements.newYear.value),
        origin: elements.newOrigin.value.trim(),
        type: elements.newType.value.trim(),
        imdb: elements.newImdb.value.trim(),
        poster: normalizePosterPath(elements.newPoster.value)
      };
      if (!movie.title || !movie.year || !movie.origin || !movie.type) {
        elements.formMessage.textContent = "Please fill movie name, year, origin, and type.";
        return;
      }
      const editingKey = elements.editingKey.value;
      const newKey = movieKey(movie);
      const duplicate = movies.some(function(item) { return movieKey(item) === newKey && movieKey(item) !== editingKey; });
      if (duplicate) {
        elements.formMessage.textContent = "This movie already exists. Use Edit if you need to change it.";
        return;
      }
      if (editingKey) {
        const index = movies.findIndex(function(item) { return movieKey(item) === editingKey; });
        if (index >= 0) movies[index] = movie;
        elements.formMessage.textContent = movie.title + " updated. Download updated file before pushing to GitHub.";
      } else {
        movies.push(movie);
        elements.formMessage.textContent = movie.title + " added. Download updated file before pushing to GitHub.";
      }
      clearForm();
      populateFilters();
      elements.search.value = movie.title;
      elements.year.value = String(movie.year);
      currentView = "year";
      elements.viewButtons.forEach(function(button) { button.classList.toggle("active", button.dataset.view === currentView); });
      render();
    });

    function downloadUpdatedHtml() {
      const html = document.documentElement.outerHTML;
      const movieJson = JSON.stringify(movies, null, 2);
      const cleanHtml = html.replace(
        /<section id="results">[\s\S]*?<\/section>\s*<div class="empty"/,
        '<section id="results"></section>\n    <div class="empty"'
      );
      const updatedHtml = "<!DOCTYPE html>\n" + cleanHtml.replace(
        /const movies = \[[\s\S]*?\];/,
        "const movies = " + movieJson + ";"
      );
      const blob = new Blob([updatedHtml], { type: "text/html" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "index.html";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      elements.formMessage.textContent = "Updated index.html downloaded. Replace your repo file, then commit and push.";
    }

    elements.search.addEventListener("input", render);
    elements.year.addEventListener("change", render);
    elements.origin.addEventListener("change", render);
    elements.type.addEventListener("change", render);
    elements.clear.addEventListener("click", function() {
      elements.search.value = "";
      elements.year.value = "all";
      elements.origin.value = "all";
      elements.type.value = "all";
      render();
    });
    elements.cancelEditBtn.addEventListener("click", clearForm);
    elements.setPasswordBtn.addEventListener("click", setPassword);
    elements.downloadUpdatedFile.addEventListener("click", downloadUpdatedHtml);
    elements.viewButtons.forEach(function(button) {
      button.addEventListener("click", function() {
        currentView = button.dataset.view;
        elements.viewButtons.forEach(function(item) { item.classList.toggle("active", item === button); });
        render();
      });
    });

    populateFilters();
    render();
  </script>
