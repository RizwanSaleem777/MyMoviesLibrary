<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Library Manager</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --primary: #e50914; /* Netflix red style */
            --primary-hover: #b20710;
            --input-bg: #333;
            --border: #444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: 50px; }

        /* Header & Controls */
        header { padding: 20px; background-color: #000; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        h1 { font-size: 1.5rem; color: var(--primary); }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        
        input, select { padding: 8px 12px; border-radius: 4px; border: 1px solid var(--border); background: var(--input-bg); color: white; outline: none; }
        input:focus, select:focus { border-color: var(--primary); }

        button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-add { background-color: var(--primary); color: white; }
        .btn-add:hover { background-color: var(--primary-hover); }
        .btn-secondary { background-color: #444; color: white; }
        .btn-secondary:hover { background-color: #555; }
        .btn-danger { background-color: #d32f2f; color: white; }

        /* Stats Bar */
        .stats-bar { display: flex; gap: 20px; padding: 15px 20px; background: #181818; border-bottom: 1px solid var(--border); font-size: 0.9rem; color: var(--text-muted); flex-wrap: wrap; }
        .stat-item span { color: var(--text-main); font-weight: bold; }

        /* Grid */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        
        .movie-card { background-color: var(--card-bg); border-radius: 8px; overflow: hidden; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: flex; flex-direction: column; }
        .movie-poster { width: 100%; height: 300px; object-fit: cover; background-color: #333; }
        .no-poster { width: 100%; height: 300px; display: flex; align-items: center; justify-content: center; background-color: #333; color: #777; font-size: 3rem; }
        
        .movie-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .movie-year { font-size: 0.8rem; color: var(--primary); margin-bottom: 5px; font-weight: bold; }
        .movie-title { font-size: 1rem; margin-bottom: 5px; line-height: 1.4; }
        .movie-meta { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 10px; display: flex; justify-content: space-between; }
        
        .movie-actions { margin-top: auto; display: flex; gap: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
        .action-btn { flex: 1; padding: 6px; font-size: 0.8rem; background: #333; color: white; border: none; border-radius: 3px; cursor: pointer; }
        .action-btn:hover { background: #444; }
        .action-btn.edit { color: #4caf50; }
        .action-btn.delete { color: #f44336; }

        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: var(--card-bg); padding: 25px; border-radius: 8px; width: 90%; max-width: 500px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        .modal h2 { margin-bottom: 20px; color: var(--text-main); }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--text-muted); }
        .form-group input, .form-group select { width: 100%; }
        
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

        /* Toast */
        #toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 4px; padding: 16px; position: fixed; z-index: 2000; left: 50%; bottom: 30px; transform: translateX(-50%); border-left: 5px solid var(--primary); box-shadow: 0 4px 8px rgba(0,0,0,0.3); opacity: 0; transition: opacity 0.3s, bottom 0.3s; }
        #toast.show { visibility: visible; opacity: 1; bottom: 50px; }

        /* Responsive */
        @media (max-width: 600px) {
            header { flex-direction: column; align-items: stretch; gap: 10px; }
            .controls { flex-direction: column; }
            .grid-container { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>My Movie Library</h1>
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search title...">
            <select id="yearFilter">
                <option value="All">All Years</option>
            </select>
            <select id="originFilter">
                <option value="All">All Origins</option>
                <option value="Hollywood">Hollywood</option>
                <option value="Bollywood">Bollywood</option>
            </select>
            <select id="typeFilter">
                <option value="All">All Types</option>
                <option value="Movie">Movies</option>
                <option value="Series">Series</option>
            </select>
            <button class="btn-add" onclick="openAddModal()">+ Add Movie</button>
            <button class="btn-secondary" onclick="exportData()">Export JSON</button>
        </div>
    </header>

    <div class="stats-bar" id="statsBar">
        Loading stats...
    </div>

    <div class="grid-container" id="movieGrid">
        <!-- Movies will be injected here -->
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="formModal">
        <div class="modal">
            <h2 id="modalTitle">Add Movie</h2>
            <form id="movieForm">
                <input type="hidden" id="movieId">
                <div class="form-group">
                    <label for="movieTitle">Title</label>
                    <input type="text" id="movieTitle" required>
                </div>
                <div class="form-group">
                    <label for="movieYear">Year</label>
                    <input type="number" id="movieYear" required>
                </div>
                <div class="form-group">
                    <label for="movieOrigin">Origin</label>
                    <select id="movieOrigin" required>
                        <option value="Hollywood">Hollywood</option>
                        <option value="Bollywood">Bollywood</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="movieType">Type</label>
                    <select id="movieType" required>
                        <option value="Movie">Movie</option>
                        <option value="Series">Series</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="movieImdb">IMDb ID/Link (Optional)</label>
                    <input type="text" id="movieImdb">
                </div>
                <div class="form-group">
                    <label for="moviePoster">Poster URL (Optional)</label>
                    <input type="text" id="moviePoster">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal('formModal')">Cancel</button>
                    <button type="submit" class="btn-add">Save Movie</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Password Modal -->
    <div class="modal-overlay" id="passwordModal">
        <div class="modal">
            <h2>Authentication Required</h2>
            <p style="margin-bottom: 15px; color: var(--text-muted);">Please enter the password to proceed.</p>
            <div class="form-group">
                <input type="password" id="passwordInput" placeholder="Password">
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-secondary" onclick="closeModal('passwordModal')">Cancel</button>
                <button type="button" class="btn-add" onclick="submitPassword()">Verify</button>
            </div>
        </div>
    </div>

    <!-- Confirm Delete Modal -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal">
            <h2>Confirm Deletion</h2>
            <p style="margin-bottom: 20px;">Are you sure you want to delete this movie? This action cannot be undone.</p>
            <div class="modal-actions">
                <button type="button" class="btn-secondary" onclick="closeModal('confirmModal')">Cancel</button>
                <button type="button" class="btn-danger" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast">Message</div>

    <script>
        // State
        let movies = [];
        const PASSWORD = "Afridi10@";
        let pendingAction = null; // Stores { type: 'edit'|'delete', id: number }

        // Initialization
        document.addEventListener('DOMContentLoaded', () => {
            loadMovies();
            setupEventListeners();
        });

        // Load Data
        async function loadMovies() {
            try {
                const response = await fetch('movies.json');
                if (!response.ok) throw new Error('Failed to load movies.json');
                movies = await response.json();
                populateYearFilter(); // Populate the new year dropdown
                renderMovies();
            } catch (error) {
                console.error('Error loading movies:', error);
                document.getElementById('movieGrid').innerHTML = '<p style="text-align:center; padding:20px;">Failed to load movies. Ensure movies.json exists.</p>';
                updateStats();
            }
        }

        // Populate Year Filter Dropdown
        function populateYearFilter() {
            const yearSelect = document.getElementById('yearFilter');
            // Get unique years
            const years = [...new Set(movies.map(m => m.year))].sort((a, b) => b - a); // Sort Descending
            
            // Clear existing options except the first one
            while (yearSelect.options.length > 1) {
                yearSelect.remove(1);
            }

            years.forEach(year => {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year;
                yearSelect.appendChild(option);
            });
        }

        // Setup Event Listeners
        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', renderMovies);
            document.getElementById('yearFilter').addEventListener('change', renderMovies); // New Listener
            document.getElementById('originFilter').addEventListener('change', renderMovies);
            document.getElementById('typeFilter').addEventListener('change', renderMovies);
            document.getElementById('movieForm').addEventListener('submit', handleFormSubmit);
            document.getElementById('passwordInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') submitPassword();
            });
        }

        // Sort Logic: Year Descending, then Title Alphabetical
        function getSortedMovies(movieList) {
            return movieList.sort((a, b) => {
                if (b.year !== a.year) {
                    return b.year - a.year; // Descending Year
                }
                return a.title.localeCompare(b.title); // Ascending Title
            });
        }

        // Render Movies
        function renderMovies() {
            const grid = document.getElementById('movieGrid');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const yearFilter = document.getElementById('yearFilter').value;
            const originFilter = document.getElementById('originFilter').value;
            const typeFilter = document.getElementById('typeFilter').value;

            // Filter
            let filteredMovies = movies.filter(movie => {
                const matchesSearch = movie.title.toLowerCase().includes(searchTerm);
                const matchesYear = yearFilter === 'All' || movie.year.toString() === yearFilter;
                const matchesOrigin = originFilter === 'All' || movie.origin === originFilter;
                const matchesType = typeFilter === 'All' || movie.type === typeFilter;
                return matchesSearch && matchesYear && matchesOrigin && matchesType;
            });

            // Sort
            const sortedMovies = getSortedMovies(filteredMovies);

            // Generate HTML
            grid.innerHTML = '';
            if (sortedMovies.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #777;">No movies found.</p>';
            } else {
                sortedMovies.forEach(movie => {
                    const posterHtml = movie.poster 
                        ? `<img src="${movie.poster}" alt="${movie.title}" class="movie-poster" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="no-poster" style="display:none">🎬</div>`
                        : `<div class="no-poster">🎬</div>`;
                    
                    const imdbLink = movie.imdb && movie.imdb.startsWith('http') 
                        ? `<a href="${movie.imdb}" target="_blank" style="color:var(--primary); text-decoration:none; font-size:1.2rem;" title="IMDb">★</a>` 
                        : (movie.imdb ? `<span title="${movie.imdb}">★</span>` : '');

                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    card.innerHTML = `
                        ${posterHtml}
                        <div class="movie-info">
                            <div class="movie-year">${movie.year}</div>
                            <div class="movie-title">${movie.title}</div>
                            <div class="movie-meta">
                                <span>${movie.origin}</span>
                                <span>${movie.type}</span>
                            </div>
                            ${imdbLink ? `<div style="margin-bottom:10px; text-align:right;">${imdbLink}</div>` : ''}
                            <div class="movie-actions">
                                <button class="action-btn edit" onclick="initiateEdit(${movie.id})">Edit</button>
                                <button class="action-btn delete" onclick="initiateDelete(${movie.id})">Delete</button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }

            updateStats(sortedMovies.length);
        }

        // Update Statistics
        function updateStats(count = null) {
            const totalMovies = count !== null ? count : movies.length;
            const origins = {};
            const types = {};

            movies.forEach(m => {
                origins[m.origin] = (origins[m.origin] || 0) + 1;
                types[m.type] = (types[m.type] || 0) + 1;
            });

            const statsHtml = `
                <div class="stat-item">Total: <span>${movies.length}</span></div>
                <div class="stat-item">Hollywood: <span>${origins['Hollywood'] || 0}</span></div>
                <div class="stat-item">Bollywood: <span>${origins['Bollywood'] || 0}</span></div>
                <div class="stat-item">Movies: <span>${types['Movie'] || 0}</span></div>
                <div class="stat-item">Series: <span>${types['Series'] || 0}</span></div>
            `;
            document.getElementById('statsBar').innerHTML = statsHtml;
        }

        // --- MODAL HANDLING ---

        function openModal(id) {
            document.getElementById(id).style.display = 'flex';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
            if(id === 'passwordModal') {
                document.getElementById('passwordInput').value = '';
                pendingAction = null;
            }
        }

        // --- ADD MOVIE ---
        function openAddModal() {
            // No Password required
            document.getElementById('modalTitle').innerText = 'Add Movie';
            document.getElementById('movieForm').reset();
            document.getElementById('movieId').value = ''; // Empty ID means Add mode
            openModal('formModal');
        }

        // --- EDIT MOVIE FLOW ---
        function initiateEdit(id) {
            pendingAction = { type: 'edit', id: id };
            document.getElementById('passwordInput').value = '';
            openModal('passwordModal');
        }

        // --- DELETE MOVIE FLOW ---
        function initiateDelete(id) {
            pendingAction = { type: 'delete', id: id };
            document.getElementById('passwordInput').value = '';
            openModal('passwordModal');
        }

        function submitPassword() {
            const input = document.getElementById('passwordInput').value;
            if (input === PASSWORD) {
                closeModal('passwordModal');
                if (pendingAction.type === 'edit') {
                    proceedToEdit(pendingAction.id);
                } else if (pendingAction.type === 'delete') {
                    openModal('confirmModal'); // Password correct, now ask for confirmation
                }
            } else {
                alert('Incorrect Password');
                document.getElementById('passwordInput').value = '';
            }
        }

        function proceedToEdit(id) {
            const movie = movies.find(m => m.id === id);
            if (!movie) return;

            document.getElementById('modalTitle').innerText = 'Edit Movie';
            document.getElementById('movieId').value = movie.id;
            document.getElementById('movieTitle').value = movie.title;
            document.getElementById('movieYear').value = movie.year;
            document.getElementById('movieOrigin').value = movie.origin;
            document.getElementById('movieType').value = movie.type;
            document.getElementById('movieImdb').value = movie.imdb || '';
            document.getElementById('moviePoster').value = movie.poster || '';

            openModal('formModal');
        }

        // Setup Confirm Delete Button
        document.getElementById('confirmDeleteBtn').onclick = function() {
            if (pendingAction && pendingAction.type === 'delete') {
                const idToDelete = pendingAction.id;
                
                // Remove movie
                movies = movies.filter(m => m.id !== idToDelete);
                
                closeModal('confirmModal');
                
                // Refresh UI
                renderMovies();
                
                // Show Success Message
                showToast("Remember to export/download the updated data before uploading to GitHub.");
            }
        };

        // --- FORM SUBMIT (ADD & SAVE) ---
        function handleFormSubmit(e) {
            e.preventDefault();
            
            const idStr = document.getElementById('movieId').value;
            const title = document.getElementById('movieTitle').value;
            const year = parseInt(document.getElementById('movieYear').value);
            const origin = document.getElementById('movieOrigin').value;
            const type = document.getElementById('movieType').value;
            const imdb = document.getElementById('movieImdb').value;
            const poster = document.getElementById('moviePoster').value;

            if (idStr) {
                // EDIT MODE
                const id = parseInt(idStr);
                const index = movies.findIndex(m => m.id === id);
                if (index !== -1) {
                    movies[index] = { ...movies[index], title, year, origin, type, imdb, poster };
                    showToast("Movie updated successfully! Remember to export/download the updated data before uploading to GitHub.");
                }
            } else {
                // ADD MODE
                // Generate unique ID
                const maxId = movies.reduce((max, m) => Math.max(max, m.id), 0);
                const newMovie = {
                    id: maxId + 1,
                    title,
                    year,
                    origin,
                    type,
                    imdb,
                    poster
                };
                movies.push(newMovie);
                // If a new year is added that wasn't in the list before, refresh the dropdown
                populateYearFilter();
                showToast("Movie added successfully!");
            }

            closeModal('formModal');
            renderMovies();
        }

        // --- EXPORT DATA ---
        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(movies, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "movies.json");
            document.body.appendChild(downloadAnchorNode); // required for firefox
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        // --- TOAST MESSAGE ---
        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 5000);
        }
    </script>
</body>
</html>
