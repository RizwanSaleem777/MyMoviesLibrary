<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Library Manager</title>
    <style>
        :root{
--bg:#f5f7fb;
--surface:#ffffff;
--surface2:#eef3fb;
--text:#1b2430;
--muted:#6c7a89;
--primary:#4f46e5;
--primary2:#7c3aed;
--success:#10b981;
--danger:#ef4444;
--border:#dbe4f0;
--shadow:0 12px 30px rgba(0,0,0,.08);
--radius:18px;
}

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
       body{
margin:0;
background:linear-gradient(180deg,#f8fbff,#eef4ff);
color:var(--text);
padding-bottom:40px;
}

        header{
position:sticky;
top:0;
z-index:999;
background:rgba(255,255,255,.85);
backdrop-filter:blur(15px);
padding:18px 30px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid var(--border);
box-shadow:0 5px 20px rgba(0,0,0,.05);
}
       h1{
font-size:28px;
font-weight:800;
color:#222;
margin:0;
}
        .controls{
display:flex;
gap:12px;
align-items:center;
flex-wrap:wrap;
}
        
       input,
select{
height:45px;
padding:0 15px;
border-radius:12px;
border:1px solid var(--border);
background:#fff;
color:#222;
font-size:14px;
transition:.25s;
}

input:focus,
select:focus{
border-color:var(--primary);
box-shadow:0 0 0 4px rgba(79,70,229,.12);
outline:none;
}
        input:focus, select:focus { border-color: var(--primary); }

       button{
height:45px;
padding:0 18px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:700;
transition:.25s;
}

.btn-add{
background:linear-gradient(135deg,var(--primary),var(--primary2));
color:white;
}

.btn-add:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(79,70,229,.25);
}

.btn-secondary{
background:#fff;
border:1px solid var(--border);
color:#333;
}

.btn-secondary:hover{
background:#f5f5f5;
}
        .btn-add { background-color: var(--primary); color: white; }
        .btn-add:hover { background-color: var(--primary-hover); }
        .btn-secondary { background-color: #444; color: white; }
        .btn-secondary:hover { background-color: #555; }

        .stats-bar { display: flex; gap: 20px; padding: 15px 20px; background: #181818; border-bottom: 1px solid var(--border); font-size: 0.9rem; color: var(--text-muted); flex-wrap: wrap; }
        .stat-item span { color: var(--text-main); font-weight: bold; }

.grid-container{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:18px;
}
.movie-card{
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
    border:1px solid #edf1f7;
    transition:.25s ease;
    position:relative;
}

.movie-card:hover{
    transform:translateY(-6px);
    box-shadow:0 18px 35px rgba(0,0,0,.15);
}
.movie-card:hover .movie-poster{
transform:scale(1.06);
}

.movie-card:hover{
transform:translateY(-10px);
box-shadow:0 25px 45px rgba(0,0,0,.15);
}
      .movie-poster{
    width:100%;
    height:330px;
    object-fit:cover;
    display:block;
    transition:.35s;
}
.movie-card:hover .movie-poster{
    transform:scale(1.05);
}
        .no-poster { width: 100%; height: 300px; display: flex; align-items: center; justify-content: center; background-color: #333; color: #777; font-size: 3rem; }
        
        .movie-info{
padding:18px;
}
       .movie-year{
display:inline-block;
background:#eef2ff;
color:#4f46e5;
padding:5px 12px;
border-radius:20px;
font-weight:700;
font-size:13px;

}

font-size:22px;
font-weight:700;
margin-bottom:12px;
color:#222;
}
      .movie-meta{

    justify-content:space-between;
    align-items:center;
    gap:8px;
    margin-top:12px;
}

.sidebar{

}

.sidebar h3{
    margin:0 0 18px;

}
.movie-meta span{

.movie-meta span:first-child{

.movie-meta span:last-child{

}
.sidebar hr{

}
.side-item{
    padding:12px 15px;

    cursor:pointer;

    transition:all .25s ease;
    font-size:15px;

    color:#444;
    display:flex;
    align-items:center;

}

.side-item:hover{

}

.side-item.active{
    background:#2563eb;
    color:#fff;

}
.side-item.active{
background:#4f46e5;
color:#fff;

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: var(--card-bg); padding: 25px; border-radius: 8px; width: 90%; max-width: 500px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .modal h2 { margin-bottom: 20px; color: var(--text-main); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--text-muted); }
        .form-group input, .form-group select { width: 100%; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

        #toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 4px; padding: 16px; position: fixed; z-index: 2000; left: 50%; bottom: 30px; transform: translateX(-50%); border-left: 5px solid var(--primary); box-shadow: 0 4px 8px rgba(0,0,0,0.3); opacity: 0; transition: opacity 0.3s, bottom 0.3s; }
        #toast.show {
    visibility: visible;
    opacity: 1;
    bottom: 50px;
}

.logo-area{

.badge{

    </style>
</head>
<body>

    <header>

    <div class="logo-area">
        <div class="logo-icon">🎬</div>

        <div>
            <h1>My Movie Library</h1>

   <div class="dashboard">

    Showing 0 Movies

<div id="mainLayout">
<aside class="sidebar">

<h3>Browse</h3>

    <div class="grid-container" id="movieGrid">
    </div>
</div>
    <!-- Add Modal -->
    <div class="modal-overlay" id="formModal">
        <div class="modal">
            <h2 id="modalTitle">Add Movie</h2>
            <form id="movieForm">
                <input type="hidden" id="movieId">
                <div class="form-group">
                    <label for="movieTitle">Title</label>
                    <input type="text" id="movieTitle" required>
                </div>
                <div class="form-group">
                    <label for="movieYear">Year</label>
                    <input type="number" id="movieYear" required>
                </div>
                <div class="form-group">
                    <label for="movieOrigin">Origin</label>
                    <select id="movieOrigin" required>
                        <option value="Hollywood">Hollywood</option>
                        <option value="Bollywood">Bollywood</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="movieType">Type</label>
                    <select id="movieType" required>
                        <option value="Movie">Movie</option>
                        <option value="Series">Series</option>
                    </select>
                </div>
<div class="form-group">
    <label for="movieGenre">Genre</label>

    <input
        type="text"
        id="movieGenre"
        placeholder="Action, Adventure, Sci-Fi"
    >

    <small style="color:#777">
        Multiple genres comma se likhen.
    </small>
</div>
                <div class="form-group">
                    <label for="movieImdb">IMDb ID/Link (Optional)</label>
                    <input type="text" id="movieImdb">
                </div>
                <div class="form-group">
                    <label for="moviePoster">Poster URL (Optional)</label>
                    <input type="text" id="moviePoster">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal('formModal')">Cancel</button>
                    <button type="submit" class="btn-add">Save Movie</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast">Message</div>

    <script>

let browseFilter = "All";
        // State

        let movies = [];

        // Initialization
        document.addEventListener('DOMContentLoaded', () => {
            loadMovies();
            setupEventListeners();
        });

      // Load Data
async function loadMovies() {
    try {
        const response = await fetch('movies.json');
        if (!response.ok) throw new Error('Failed to load movies.json');

        movies = await response.json();

        populateYearFilter();

        renderGenres();

        renderMovies();

        initHeroBanner();   // 👈 Ye line yahin add karni hai

    } catch (error) {

        console.error('Error loading movies:', error);

        document.getElementById('movieGrid').innerHTML =
            '<p style="text-align:center; padding:20px;">Failed to load movies. Ensure movies.json exists.</p>';

        updateStats();
    }
}

        // Populate Year Filter Dropdown
        function populateYearFilter() {
            const yearSelect = document.getElementById('yearFilter');
            const years = [...new Set(movies.map(m => m.year))].sort((a, b) => b - a); 
            
            while (yearSelect.options.length > 1) {
                yearSelect.remove(1);
            }

            years.forEach(year => {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year;
                yearSelect.appendChild(option);
            });
        }

        // Setup Event Listeners
        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', renderMovies);
            document.getElementById('yearFilter').addEventListener('change', renderMovies); 
            document.getElementById('originFilter').addEventListener('change', renderMovies);
            document.getElementById('typeFilter').addEventListener('change', renderMovies);
            document.getElementById('movieForm').addEventListener('submit', handleFormSubmit);
        }

        // Sort Logic: Year Descending, then Title Alphabetical
        function getSortedMovies(movieList) {
            return movieList.sort((a, b) => {
                if (b.year !== a.year) {
                    return b.year - a.year; 
                }
                return a.title.localeCompare(b.title); 
            });
        }


        // Render Movies
        function renderMovies() {
            const grid = document.getElementById('movieGrid');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const yearFilter = document.getElementById('yearFilter').value;
            const originFilter = document.getElementById('originFilter').value;
            const typeFilter = document.getElementById('typeFilter').value;


            // Filter
           let filteredMovies = movies.filter(movie => {
const matchesSearch =
    movie.title.toLowerCase().includes(searchTerm);

const matchesYear =
    yearFilter === 'All' ||
    movie.year.toString() === yearFilter;

const matchesOrigin =
    originFilter === 'All' ||
    movie.origin === originFilter;

const matchesType =
    typeFilter === 'All' ||
    movie.type === typeFilter;

const matchesBrowse =
    browseFilter === "All" ||
    (browseFilter === "Hollywood" && movie.origin === "Hollywood") ||
    (browseFilter === "Bollywood" && movie.origin === "Bollywood") ||
    (browseFilter === "Series" && movie.type === "Series");

const matchesGenre =
    !selectedGenre ||
    selectedGenre === "All" ||
    (Array.isArray(movie.genre) &&
     movie.genre.includes(selectedGenre));

return matchesSearch &&
       matchesYear &&
       matchesOrigin &&
       matchesType &&
       matchesBrowse &&
       matchesGenre; });


            // Sort
            const sortedMovies = getSortedMovies(filteredMovies);
document.getElementById("resultsInfo").textContent =
    `Showing ${sortedMovies.length} Movie${sortedMovies.length !== 1 ? "s" : ""}`;

            // Generate HTML
            grid.innerHTML = '';
            if (sortedMovies.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #777;">No movies found.</p>';
            } else {
                sortedMovies.forEach(movie => {
                    const posterHtml = movie.poster 
                        ? `<img src="${movie.poster}" alt="${movie.title}" class="movie-poster" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="no-poster" style="display:none">🎬</div>`
                        : `<div class="no-poster">🎬</div>`;
                    
                    const imdbLink = movie.imdb && movie.imdb.startsWith('http') 
                        ? `<a href="${movie.imdb}" target="_blank" style="color:var(--primary); text-decoration:none; font-size:1.2rem;" title="IMDb">★</a>` 
                        : (movie.imdb ? `<span title="${movie.imdb}">★</span>` : '');

                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    card.innerHTML = `
                        ${posterHtml}
                        <div class="movie-info">
                            <div class="movie-year">${movie.year}</div>
                            <div class="movie-title">${movie.title}</div>
                            <div class="movie-meta">
    <span class="badge origin-badge">${movie.origin}</span>
    <span class="badge type-badge">${movie.type}</span>
</div>

${movie.genre && movie.genre.length ? `
<div class="movie-genre">
    ${movie.genre.join(" • ")}
</div>
` : ""}
                            ${imdbLink ? `<div style="margin-bottom:10px; text-align:right;">${imdbLink}</div>` : ''}
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }

            updateStats(sortedMovies.length);
        }
function setBrowse(type, element){

    browseFilter = type;

    document.querySelectorAll(".sidebar .side-item").forEach(item=>{
        item.classList.remove("active");
    });

    element.classList.add("active");

    renderMovies();
}


        // Update Statistics
        function updateStats(count = null) {
            const totalMovies = count !== null ? count : movies.length;
            const origins = {};
            const types = {};

            movies.forEach(m => {
                origins[m.origin] = (origins[m.origin] || 0) + 1;
                types[m.type] = (types[m.type] || 0) + 1;
            });

           
            document.getElementById("totalMovies").innerText = movies.length;
document.getElementById("hollywoodCount").innerText = origins["Hollywood"] || 0;
document.getElementById("bollywoodCount").innerText = origins["Bollywood"] || 0;
document.getElementById("seriesCount").innerText = types["Series"] || 0;
        }

        // --- MODAL HANDLING ---

        function openModal(id) {
            document.getElementById(id).style.display = 'flex';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        // --- ADD MOVIE ---
        function openAddModal() {
            document.getElementById('modalTitle').innerText = 'Add Movie';
            document.getElementById('movieForm').reset();
            document.getElementById('movieId').value = ''; 
            openModal('formModal');
        }

        // --- FORM SUBMIT (ADD & SAVE) ---
        function handleFormSubmit(e) {
            e.preventDefault();
            
            const idStr = document.getElementById('movieId').value;
            const title = document.getElementById('movieTitle').value;
            const year = parseInt(document.getElementById('movieYear').value);
            const origin = document.getElementById('movieOrigin').value;
            const type = document.getElementById('movieType').value;
const genre = document.getElementById('movieGenre')
    .value
    .split(',')
    .map(g => g.trim())
    .filter(g => g);
            const imdb = document.getElementById('movieImdb').value;
            const poster = document.getElementById('moviePoster').value;

            if (idStr) {
                // EDIT MODE (Remains internally intact per instructions to not modify core logic, though UI access is removed)
                const id = parseInt(idStr);
                const index = movies.findIndex(m => m.id === id);
                if (index !== -1) {
                    movies[index] = {
    ...movies[index],
    title,
    year,
    origin,
    type,
    genre,
    imdb,
    poster
};
                    showToast("Movie updated successfully!");
                }
            } else {
                // ADD MODE
                const maxId = movies.reduce((max, m) => Math.max(max, m.id), 0);
               const newMovie = {
    id: maxId + 1,
    title,
    year,
    origin,
    type,
    genre,
    imdb,
    poster
};
                movies.push(newMovie);
                populateYearFilter();
                showToast("Movie added successfully!");
            }

            closeModal('formModal');
            renderMovies();
        }

        // --- EXPORT DATA ---
        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(movies, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "movies.json");
            document.body.appendChild(downloadAnchorNode); 
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        // --- TOAST MESSAGE ---
        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 5000);
        }

function setBrowse(type, element){

    browseFilter = type;

    document.querySelectorAll(".sidebar .side-item").forEach(item=>{
        item.classList.remove("active");
    });

    element.classList.add("active");

    renderMovies();

}

// ======== YE NEECHHE PASTE KARO ========

let selectedGenre = "All";

function renderGenres(){

    const genreList = document.getElementById("genreList");

    const genres = [...new Set(
        movies.flatMap(m => Array.isArray(m.genre) ? m.genre : [])
    )].sort();

    genreList.innerHTML = "";

   genreList.innerHTML = `
<div class="side-item active"
     onclick="setGenre('All', this)">
     🎭 All Genres
</div>`;
    genres.forEach(g=>{

        genreList.innerHTML += `
            <div class="side-item"
                 onclick="setGenre('${g}',this)">
                ${g}
            </div>
        `;

    });

}

function setGenre(genre, element){

    selectedGenre = genre || "All";

    document.querySelectorAll("#genreList .side-item").forEach(item=>{
        item.classList.remove("active");
    });

    if(element){
        element.classList.add("active");
    }

    renderMovies();

}

/* ========= HERO BANNER ========= */

let heroTimer = null;

function initHeroBanner(){

    const banner = document.getElementById("heroBanner");

    if(!banner) return;

    if(!movies || movies.length===0) return;

    banner.style.display="flex";

    heroRandom();

    clearInterval(heroTimer);

    heroTimer=setInterval(heroRandom,6000);

}

function heroRandom(){

    const movie=movies[Math.floor(Math.random()*movies.length)];

    const poster=movie.poster || "";

    document.getElementById("heroTitle").textContent=movie.title || "";

    document.getElementById("heroYear").textContent=movie.year || "";

    document.getElementById("heroGenre").textContent=
        `${movie.origin} • ${movie.type} • ${(movie.genre||[]).join(" • ")}`;

    document.getElementById("heroPoster").src=poster;

    document.getElementById("heroBg").style.backgroundImage=`url('${poster}')`;

}
