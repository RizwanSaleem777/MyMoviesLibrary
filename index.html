<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Movie Library</title>
  <style>
    :root{--bg:#f7f7fb;--surface:#fff;--text:#17172a;--muted:#77778b;--primary:#4f46e5;--primary-dark:#4338ca;--line:#e8e8f1;--radius:20px;--shadow:0 14px 40px rgba(34,28,80,.09)}
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 85% 0,#eeeefe 0,transparent 27%),var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;padding-bottom:48px} button,input,select{font:inherit} button{cursor:pointer;border:0}.hidden{display:none!important}
    header{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:26px;padding:16px clamp(18px,4vw,56px);background:rgba(255,255,255,.78);border-bottom:1px solid rgba(232,232,241,.9);backdrop-filter:blur(18px)}
    .logo-area{display:flex;align-items:center;gap:11px;white-space:nowrap}.logo-icon{display:grid;place-items:center;width:42px;height:42px;border-radius:14px;background:linear-gradient(145deg,#5e56ed,#3730a3);font-size:21px;box-shadow:0 8px 18px #4f46e548}h1{margin:0;font-size:18px;letter-spacing:-.6px}.logo-subtitle{display:block;font-size:11px;color:var(--muted);margin-top:2px}.controls{display:flex;gap:9px;align-items:center;flex:1;justify-content:flex-end;flex-wrap:wrap}input,select{height:42px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--text);padding:0 12px;outline:none;transition:.2s}input:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 4px #4f46e51a}#searchInput{min-width:205px}.btn-add,.btn-secondary{height:42px;padding:0 15px;border-radius:12px;font-weight:700;transition:.2s}.btn-add{color:#fff;background:linear-gradient(135deg,var(--primary),#7652e8);box-shadow:0 7px 15px #4f46e529}.btn-add:hover{transform:translateY(-2px);box-shadow:0 10px 20px #4f46e54d}.btn-secondary{border:1px solid var(--line);background:#fff;color:#363647}.btn-secondary:hover{background:#f5f5fb}
    .page-wrap{width:100%;max-width:none;margin:auto;padding:0 clamp(18px,4vw,56px)}.hero-banner{position:relative;min-height:425px;margin-top:28px;border-radius:28px;overflow:hidden;background:#17162c;box-shadow:0 24px 50px rgba(28,21,74,.22);display:flex}.hero-bg-blur{position:absolute;inset:-35px;background-size:cover;background-position:center;filter:blur(18px) saturate(1.2);opacity:.44;transform:scale(1.08);transition:background-image .5s}.hero-overlay{position:absolute;inset:0;background:linear-gradient(90deg,rgba(12,11,29,.97) 8%,rgba(17,15,42,.78) 48%,rgba(21,17,47,.36)),linear-gradient(0deg,rgba(7,6,22,.28),transparent)}.hero-content{position:relative;z-index:1;width:100%;display:flex;align-items:center;gap:clamp(22px,4vw,54px);padding:40px clamp(24px,5vw,68px);color:white}.hero-content.hero-fade{animation:fade .45s ease}.hero-poster-wrapper{width:210px;height:310px;flex:0 0 auto;border-radius:16px;overflow:hidden;background:#292447;border:1px solid #ffffff30;box-shadow:0 18px 34px #0008}.hero-poster-img{width:100%;height:100%;object-fit:cover}.hero-placeholder,.no-poster{display:grid;place-items:center;background:linear-gradient(135deg,#35305c,#17142c);color:#ffffff77;font-size:52px}.hero-details{max-width:690px}.hero-meta-row,.hero-actions{display:flex;gap:9px;align-items:center;flex-wrap:wrap}.hero-badge-year,.hero-badge-origin,.hero-badge-type{padding:6px 10px;border-radius:999px;background:#ffffff1c;border:1px solid #ffffff2b;font-size:12px;font-weight:700}.hero-badge-origin{color:#bebaff}.hero-badge-type{color:#a8f1d5}.hero-title{font-size:clamp(32px,4.2vw,57px);line-height:1.03;letter-spacing:-2.4px;margin:16px 0 12px}.hero-genres{color:#e2e1f5;font-size:14px;margin-bottom:25px}.btn-hero-primary,.btn-hero-secondary{height:44px;border-radius:12px;padding:0 17px;display:inline-flex;align-items:center;text-decoration:none;font-weight:750;color:#fff;transition:.2s}.btn-hero-primary{background:var(--primary)}.btn-hero-secondary{background:#fff1;border:1px solid #fff3}.btn-hero-primary:hover,.btn-hero-secondary:hover{transform:translateY(-2px);background:#fff2}
    .carousel-shell{margin:-23px 28px 0;position:relative;z-index:2;padding:12px 15px;border:1px solid #ffffffaa;background:#ffffffe6;backdrop-filter:blur(16px);border-radius:18px;box-shadow:var(--shadow)}.poster-carousel{display:flex;gap:10px;overflow-x:auto;padding:2px;scrollbar-width:thin}.poster-carousel.carousel-refresh{animation:carouselRefresh .5s ease both}.carousel-poster{flex:0 0 58px;width:58px;height:80px;border:2px solid transparent;border-radius:9px;overflow:hidden;padding:0;background:#e8e8f1;transition:.22s}.carousel-poster:hover,.carousel-poster.active{transform:translateY(-3px);border-color:var(--primary);box-shadow:0 7px 14px #4f46e52e}.carousel-poster img{width:100%;height:100%;object-fit:cover}.carousel-poster span{height:100%;display:grid;place-items:center;color:#777}@keyframes carouselRefresh{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .filter-section{margin-top:30px}.filter-row{display:flex;gap:9px;flex-wrap:wrap}.filter-row+.filter-row{margin-top:9px}.filter-chip{padding:9px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;color:#5e5d70;font-size:13px;font-weight:700;transition:.2s}.filter-chip:hover{border-color:#aaa6ff;color:var(--primary);transform:translateY(-1px)}.filter-chip.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 7px 13px #4f46e52c}.genre-row .filter-chip.active{background:#eeeefe;color:var(--primary);border-color:#cbc8ff}
    .dashboard{margin:27px 0}.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:15px}.stats-card{padding:20px;border:1px solid #ffffff;background:linear-gradient(135deg,#fff,#f6f5ff);border-radius:18px;box-shadow:var(--shadow);transition:.2s}.stats-card:hover{transform:translateY(-4px)}.stat-number{font-size:29px;font-weight:800;letter-spacing:-1px;color:var(--primary)}.stat-title{margin-top:4px;font-size:13px;color:var(--muted);font-weight:650}#resultsInfo{font-weight:700;font-size:14px;margin:9px 0 17px;color:#5c5b70}#mainLayout{display:block;width:100%}.grid-container{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px;width:100%}.movie-card{overflow:hidden;border-radius:16px;background:#fff;border:1px solid #ececf3;box-shadow:0 7px 20px rgba(34,28,80,.07);transition:.28s;min-width:0}.movie-card:hover{transform:translateY(-8px);box-shadow:0 20px 35px rgba(34,28,80,.16)}.poster-wrap{height:225px;overflow:hidden;background:#e9e9f0}.movie-poster{width:100%;height:100%;object-fit:cover;display:block;transition:.4s}.movie-card:hover .movie-poster{transform:scale(1.06)}.no-poster{width:100%;height:100%}.movie-info{padding:12px}.movie-year{font-size:12px;font-weight:800;color:var(--primary);margin-bottom:5px}.movie-title{font-size:15px;font-weight:800;letter-spacing:-.35px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.movie-meta{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap}.badge{border-radius:999px;padding:3px 7px;font-size:10px;font-weight:750}.origin-badge{background:#eff4ff;color:#3b65b5}.type-badge{background:#edfbf5;color:#20845b}.movie-genre{margin:8px 0 2px;color:var(--muted);font-size:11px;line-height:1.4;min-height:15px}.imdb-link{display:inline-flex;margin-top:5px;color:#a16207;font-size:12px;font-weight:800;text-decoration:none}
    .modal-overlay{position:fixed;inset:0;z-index:40;background:#16122b99;backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:20px}.modal{width:min(100%,550px);max-height:90vh;overflow:auto;background:#fff;padding:28px;border-radius:23px;box-shadow:0 24px 70px #110b30aa}.modal h2{margin:0 0 20px;font-size:25px}.form-group{margin:13px 0}.form-group label{display:block;margin:0 0 6px;font-size:13px;font-weight:750;color:#565568}.form-group input,.form-group select{width:100%}.form-group small{color:var(--muted)}.modal-actions{display:flex;justify-content:flex-end;gap:9px;margin-top:22px}#toast{visibility:hidden;opacity:0;position:fixed;z-index:50;left:50%;bottom:20px;transform:translateX(-50%) translateY(10px);background:#24213d;color:#fff;padding:13px 18px;border-radius:12px;box-shadow:var(--shadow);transition:.25s}#toast.show{visibility:visible;opacity:1;transform:translateX(-50%)}@keyframes fade{from{opacity:.25;transform:translateY(8px)}to{opacity:1;transform:none}}
    @media(max-width:1100px){.grid-container{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px}.poster-wrap{height:210px}}@media(max-width:940px){header{align-items:flex-start;flex-direction:column;gap:13px}.controls{justify-content:flex-start;width:100%}.hero-banner{min-height:390px}.stats-row{grid-template-columns:repeat(2,1fr)}}@media(max-width:620px){header{padding:14px 18px}.controls{gap:7px}.controls input{width:100%;min-width:0!important}.controls select{flex:1;min-width:0}.btn-add,.btn-secondary{flex:1}.page-wrap{padding:0 12px}.hero-banner{margin-top:18px}.hero-content{padding:30px 23px;align-items:flex-start;gap:20px}.hero-poster-wrapper{width:117px;height:174px}.hero-title{letter-spacing:-1.3px}.carousel-shell{margin:-15px 10px 0}.stats-row{gap:10px}.stats-card{padding:15px}.grid-container{grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.poster-wrap{height:132px}.movie-info{padding:8px}.movie-year{font-size:10px}.movie-title{font-size:12px}.movie-meta{flex-wrap:wrap;gap:3px}.badge{font-size:8px;padding:3px 5px}.movie-genre{display:none}.imdb-link{font-size:10px;margin-top:4px}.filter-chip{padding:8px 11px}.hero-actions{margin-top:13px}.btn-hero-primary,.btn-hero-secondary{height:39px;padding:0 11px}}
  </style>
</head>
<body>
<header><div class="logo-area"><div class="logo-icon">🎬</div><div><h1>My Movie Library</h1><span class="logo-subtitle">Personal Movie Collection</span></div></div><div class="controls"><input type="text" id="searchInput" placeholder="Search movies..."><select id="yearFilter"><option value="All">All Years</option></select><select id="originFilter"><option value="All">All Origins</option><option value="Hollywood">Hollywood</option><option value="Bollywood">Bollywood</option></select><select id="typeFilter"><option value="All">All Types</option><option value="Movie">Movies</option><option value="Series">Series</option></select><button class="btn-add" onclick="openAddModal()">＋ Add Movie</button><button class="btn-secondary" onclick="exportData()">Export</button></div></header>
<main class="page-wrap"><section class="hero-banner" id="heroBannerSection" style="display:none"><div class="hero-bg-blur" id="heroBgBlur"></div><div class="hero-overlay"></div><div class="hero-content" id="heroContentAnimated"><div class="hero-poster-wrapper" id="heroPosterContainer"></div><div class="hero-details"><div class="hero-meta-row"><span class="hero-badge-year" id="heroYear">—</span><span class="hero-badge-origin" id="heroOrigin">—</span><span class="hero-badge-type" id="heroType">—</span></div><h2 class="hero-title" id="heroTitle">Loading spotlight…</h2><div class="hero-genres" id="heroGenres"></div><div class="hero-actions"><button class="btn-hero-primary" onclick="changeHeroMovie()">🎲 Random Movie</button><a id="heroImdbBtn" href="#" target="_blank" rel="noopener" class="btn-hero-secondary" style="display:none">★ IMDb</a></div></div></div></section><div class="carousel-shell"><div class="poster-carousel" id="posterCarousel" aria-label="Featured movie carousel"></div></div>
<section class="filter-section"><div class="filter-row" id="browseList"><button class="filter-chip active" onclick="setBrowse('All',this)">All Movies</button><button class="filter-chip" onclick="setBrowse('Hollywood',this)">Hollywood</button><button class="filter-chip" onclick="setBrowse('Bollywood',this)">Bollywood</button><button class="filter-chip" onclick="setBrowse('Series',this)">Series</button></div><div class="filter-row genre-row" id="genreList"><span class="filter-chip">Loading genres…</span></div></section>
<section class="dashboard"><div class="stats-row"><div class="stats-card"><div class="stat-number" id="totalMovies">0</div><div class="stat-title">Total Movies</div></div><div class="stats-card"><div class="stat-number" id="hollywoodCount">0</div><div class="stat-title">Hollywood</div></div><div class="stats-card"><div class="stat-number" id="bollywoodCount">0</div><div class="stat-title">Bollywood</div></div><div class="stats-card"><div class="stat-number" id="seriesCount">0</div><div class="stat-title">Series</div></div></div></section><div id="resultsInfo">Showing 0 Movies</div><div id="mainLayout"><div class="grid-container" id="movieGrid"></div></div></main>
<div class="modal-overlay" id="formModal"><div class="modal"><h2 id="modalTitle">Add Movie</h2><form id="movieForm"><input type="hidden" id="movieId"><div class="form-group"><label for="movieTitle">Title</label><input type="text" id="movieTitle" required></div><div class="form-group"><label for="movieYear">Year</label><input type="number" id="movieYear" required></div><div class="form-group"><label for="movieOrigin">Origin</label><select id="movieOrigin" required><option value="Hollywood">Hollywood</option><option value="Bollywood">Bollywood</option></select></div><div class="form-group"><label for="movieType">Type</label><select id="movieType" required><option value="Movie">Movie</option><option value="Series">Series</option></select></div><div class="form-group"><label for="movieGenre">Genre</label><input type="text" id="movieGenre" placeholder="Action, Adventure, Sci-Fi"><small>Enter multiple genres separated by commas.</small></div><div class="form-group"><label for="movieImdb">IMDb ID/Link (Optional)</label><input type="text" id="movieImdb"></div><div class="form-group"><label for="moviePoster">Poster URL (Optional)</label><input type="text" id="moviePoster"></div><div class="modal-actions"><button type="button" class="btn-secondary" onclick="closeModal('formModal')">Cancel</button><button type="submit" class="btn-add">Save Movie</button></div></form></div></div><div id="toast">Message</div>
<script>
let browseFilter='All',selectedGenre='All',movies=[],heroIntervalId=null,carouselIntervalId=null,heroMovie=null,carouselMovieIds=[];
document.addEventListener('DOMContentLoaded',()=>{loadMovies();setupEventListeners()});
async function loadMovies(){try{const response=await fetch('movies.json');if(!response.ok)throw new Error('Failed to load movies.json');movies=await response.json();populateYearFilter();renderGenres();renderMovies();initHeroBanner();renderCarousel()}catch(error){console.error('Error loading movies:',error);document.getElementById('movieGrid').innerHTML='<p style="grid-column:1/-1;text-align:center;color:#777">Failed to load movies. Ensure movies.json exists.</p>';updateStats()}}
function populateYearFilter(){const s=document.getElementById('yearFilter'),years=[...new Set(movies.map(m=>m.year))].sort((a,b)=>b-a);while(s.options.length>1)s.remove(1);years.forEach(y=>{const o=document.createElement('option');o.value=y;o.textContent=y;s.appendChild(o)})}
function setupEventListeners(){['searchInput','yearFilter','originFilter','typeFilter'].forEach(id=>document.getElementById(id).addEventListener(id==='searchInput'?'input':'change',renderMovies));document.getElementById('movieForm').addEventListener('submit',handleFormSubmit)}
function getSortedMovies(list){return list.sort((a,b)=>b.year!==a.year?b.year-a.year:a.title.localeCompare(b.title))}
function renderMovies(){const searchTerm=document.getElementById('searchInput').value.toLowerCase(),yearFilter=document.getElementById('yearFilter').value,originFilter=document.getElementById('originFilter').value,typeFilter=document.getElementById('typeFilter').value;const filteredMovies=movies.filter(m=>{const matchesBrowse=browseFilter==='All'||(browseFilter==='Hollywood'&&m.origin==='Hollywood')||(browseFilter==='Bollywood'&&m.origin==='Bollywood')||(browseFilter==='Series'&&m.type==='Series');const matchesGenre=!selectedGenre||selectedGenre==='All'||(Array.isArray(m.genre)&&m.genre.includes(selectedGenre));return m.title.toLowerCase().includes(searchTerm)&&(yearFilter==='All'||m.year.toString()===yearFilter)&&(originFilter==='All'||m.origin===originFilter)&&(typeFilter==='All'||m.type===typeFilter)&&matchesBrowse&&matchesGenre});const sortedMovies=getSortedMovies(filteredMovies);document.getElementById('resultsInfo').textContent=`Showing ${sortedMovies.length} Movie${sortedMovies.length!==1?'s':''}`;const grid=document.getElementById('movieGrid');grid.innerHTML=sortedMovies.length?'':'<p style="grid-column:1/-1;text-align:center;color:#777">No movies found.</p>';sortedMovies.forEach(m=>{const poster=m.poster?`<img src="${m.poster}" alt="${m.title}" class="movie-poster" onerror="this.style.display='none';this.nextElementSibling.style.display='grid'"><div class="no-poster" style="display:none">🎬</div>`:'<div class="no-poster">🎬</div>';const imdb=m.imdb&&m.imdb.startsWith('http')?`<a href="${m.imdb}" target="_blank" rel="noopener" class="imdb-link">★ IMDb</a>`:(m.imdb?`<span class="imdb-link" title="${m.imdb}">★ IMDb</span>`:'');const card=document.createElement('article');card.className='movie-card';card.innerHTML=`<div class="poster-wrap">${poster}</div><div class="movie-info"><div class="movie-year">${m.year}</div><div class="movie-title" title="${m.title}">${m.title}</div><div class="movie-meta"><span class="badge origin-badge">${m.origin}</span><span class="badge type-badge">${m.type}</span></div>${m.genre&&m.genre.length?`<div class="movie-genre">${m.genre.join(' · ')}</div>`:''}${imdb}</div>`;grid.appendChild(card)});updateStats()}
function setBrowse(type,el){browseFilter=type;document.querySelectorAll('#browseList .filter-chip').forEach(x=>x.classList.remove('active'));el.classList.add('active');renderMovies()}
function updateStats(){const origins={},types={};movies.forEach(m=>{origins[m.origin]=(origins[m.origin]||0)+1;types[m.type]=(types[m.type]||0)+1});totalMovies.innerText=movies.length;hollywoodCount.innerText=origins.Hollywood||0;bollywoodCount.innerText=origins.Bollywood||0;seriesCount.innerText=types.Series||0}
function renderGenres(){const list=document.getElementById('genreList'),genres=[...new Set(movies.flatMap(m=>Array.isArray(m.genre)?m.genre:[]))].sort();list.innerHTML='';const addChip=(label,genre,isActive=false)=>{const chip=document.createElement('button');chip.type='button';chip.className=`filter-chip${isActive?' active':''}`;chip.textContent=label;chip.addEventListener('click',()=>setGenre(genre,chip));list.appendChild(chip)};addChip('All Genres','All',true);genres.forEach(genre=>addChip(genre,genre))}
function setGenre(g,el){selectedGenre=g||'All';document.querySelectorAll('#genreList .filter-chip').forEach(x=>x.classList.remove('active'));if(el)el.classList.add('active');renderMovies()}
function openModal(id){document.getElementById(id).style.display='flex'}function closeModal(id){document.getElementById(id).style.display='none'}function openAddModal(){modalTitle.innerText='Add Movie';movieForm.reset();movieId.value='';openModal('formModal')}
function handleFormSubmit(e){e.preventDefault();const idStr=movieId.value,title=movieTitle.value,year=parseInt(movieYear.value),origin=movieOrigin.value,type=movieType.value,genre=movieGenre.value.split(',').map(g=>g.trim()).filter(Boolean),imdb=movieImdb.value,poster=moviePoster.value;if(idStr){const i=movies.findIndex(m=>m.id===parseInt(idStr));if(i!==-1){movies[i]={...movies[i],title,year,origin,type,genre,imdb,poster};showToast('Movie updated successfully!')}}else{movies.push({id:movies.reduce((max,m)=>Math.max(max,m.id),0)+1,title,year,origin,type,genre,imdb,poster});populateYearFilter();renderGenres();renderCarousel();showToast('Movie added successfully!')}closeModal('formModal');renderMovies()}
function exportData(){const a=document.createElement('a');a.href='data:text/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(movies,null,2));a.download='movies.json';document.body.appendChild(a);a.click();a.remove()}function showToast(message){toast.innerText=message;toast.className='show';setTimeout(()=>toast.className='',5000)}
function initHeroBanner(){if(!movies.length)return;heroBannerSection.style.display='flex';changeHeroMovie();if(heroIntervalId)clearInterval(heroIntervalId);heroIntervalId=setInterval(changeHeroMovie,6000);if(carouselIntervalId)clearInterval(carouselIntervalId);carouselIntervalId=setInterval(renderCarousel,18000)}function changeHeroMovie(){if(!movies.length)return;setHeroMovie(movies[Math.floor(Math.random()*movies.length)])}function setHeroMovie(movie){heroMovie=movie;heroContentAnimated.classList.remove('hero-fade');void heroContentAnimated.offsetWidth;heroContentAnimated.classList.add('hero-fade');heroBgBlur.style.backgroundImage=movie.poster?`url('${movie.poster}')`:'none';heroPosterContainer.innerHTML=movie.poster?`<img src="${movie.poster}" alt="${movie.title}" class="hero-poster-img" onerror="handleHeroPosterError(this)">`:'<div class="hero-placeholder">🎬</div>';heroTitle.textContent=movie.title;heroYear.textContent=movie.year||'N/A';heroOrigin.textContent=movie.origin||'N/A';heroType.textContent=movie.type||'Movie';heroGenres.textContent=movie.genre&&movie.genre.length?movie.genre.join(' · '):'';heroImdbBtn.style.display=movie.imdb&&movie.imdb.startsWith('http')?'inline-flex':'none';if(heroImdbBtn.style.display!=='none')heroImdbBtn.href=movie.imdb;document.querySelectorAll('.carousel-poster').forEach(b=>b.classList.toggle('active',b.dataset.id==movie.id))}function handleHeroPosterError(){heroPosterContainer.innerHTML='<div class="hero-placeholder">🎬</div>';heroBgBlur.style.backgroundImage='none'}function getRandomCarouselMovies(){const count=Math.min(20,movies.length);let pool=movies.filter(movie=>!carouselMovieIds.includes(movie.id));if(pool.length<count)pool=movies.slice();for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]]}return pool.slice(0,count)}function renderCarousel(){const c=document.getElementById('posterCarousel'),selection=getRandomCarouselMovies();c.classList.remove('carousel-refresh');void c.offsetWidth;c.classList.add('carousel-refresh');c.innerHTML='';selection.forEach(m=>{const b=document.createElement('button');b.className='carousel-poster';b.dataset.id=m.id;b.title=m.title;b.innerHTML=m.poster?`<img src="${m.poster}" alt="${m.title}">`:'<span>🎬</span>';b.onclick=()=>setHeroMovie(m);c.appendChild(b)});carouselMovieIds=selection.map(m=>m.id);if(heroMovie)document.querySelectorAll('.carousel-poster').forEach(b=>b.classList.toggle('active',b.dataset.id==heroMovie.id))}
</script></body></html>
